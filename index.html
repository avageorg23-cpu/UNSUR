<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reservas Bungalows UNSUR</title>

  <style>
    * { box-sizing: border-box; }

    :root{
      --pad: clamp(10px, 2.0vw, 18px);
      --day: clamp(38px, 8.6vw, 46px);
      --gap: clamp(7px, 1.4vw, 10px);
    }

    body{
      margin:0; padding:0;
      font-family:'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background-size:cover; background-position:center; background-repeat:no-repeat;
      transition: background-image .5s ease-in-out;
      color:#fff; text-align:center;
      min-height: 100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: calc(var(--pad) + env(safe-area-inset-top)) var(--pad) calc(var(--pad) + env(safe-area-inset-bottom)) var(--pad);
    }

    .container{
      background-size:cover; background-position:center; background-repeat:no-repeat;
      border: 1px solid rgba(255,255,255,0.22);
      padding: 20px 18px 22px;
      border-radius: 22px;
      max-width: 680px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.40);
      backdrop-filter: blur(3px);
      position: relative;
      overflow: auto;
      max-height: calc(100dvh - (var(--pad) * 2) - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      -webkit-overflow-scrolling: touch;
    }

    h2{ margin:0 0 8px; font-size: clamp(1.35rem, 3.6vw, 1.75rem); letter-spacing:.02em; }
    .subtitle{ margin:0 0 12px; font-size: clamp(.90rem, 2.6vw, .95rem); opacity:.92; line-height:1.25; }

    .top-row{ display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin: 10px 0 6px; }
    select{
      -webkit-appearance:none; appearance:none;
      padding: 11px 44px 11px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.28);
      color:#fff;
      font-size: clamp(.92rem, 2.5vw, .95rem);
      font-weight:800;
      min-width: min(340px, 92vw);
      outline:none;
      box-shadow: 0 8px 18px rgba(0,0,0,0.22);
      backdrop-filter: blur(4px);
    }

    .select-wrap{ position:relative; display:inline-block; }
    .select-wrap:after{ content:"▾"; position:absolute; right:14px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,0.85); pointer-events:none; }

    .price-line{ margin: 8px 0 10px; font-size: 0.95rem; font-weight: 900; background: rgba(0,0,0,0.22); border: 1px solid rgba(255,255,255,0.18); padding: 8px 14px; border-radius: 999px; display: inline-block; backdrop-filter: blur(4px); }

    .calendar-nav{ display:flex; justify-content:center; gap:10px; margin-top: 10px; flex-wrap: wrap; }
    button{ border:none; border-radius: 999px; padding: 10px 14px; font-family:inherit; font-weight:900; cursor:pointer; color:#fff; background: rgba(0, 51, 102, 0.92); box-shadow: 0 6px 16px rgba(0,0,0,0.35); transition: transform .08s ease; }
    button:disabled{ opacity:.55; cursor:not-allowed; }

    #calendar { position: relative; }
    .loading-overlay { position: absolute; inset: 0; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 10; border-radius: 16px; color: #003366; font-weight: 900; flex-direction: column; gap: 10px; }
    .spinner { width: 30px; height: 30px; border: 4px solid rgba(0, 51, 102, 0.2); border-top-color: #003366; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    table{ width:100%; border-collapse: separate; border-spacing: var(--gap); background: rgba(255,255,255,0.90); color:#000; border-radius: 16px; padding: clamp(9px, 1.9vw, 12px); box-shadow: 0 10px 24px rgba(0,0,0,0.18); }
    th{ color: rgba(0,0,0,0.55); font-weight: 900; font-size: 0.72rem; text-transform: uppercase; }
    td > .day{ width: var(--day); height: var(--day); margin: 0 auto; border-radius: 999px; display:grid; place-items:center; font-weight: 900; background: rgba(0,0,0,0.05); transition: transform .08s ease; user-select: none; }
    td.available > .day{ background: rgba(200,247,197,0.95); cursor:pointer; }
    td.unavailable > .day{ background: rgba(0,0,0,0.07); color: rgba(0,0,0,0.35); cursor:not-allowed; opacity: 0.75; }
    td.checkin > .day, td.checkout > .day{ background: #003366 !important; color:#fff !important; }
    td.selected-day > .day{ background: rgba(10, 90, 170, 0.18) !important; }

    .payment-info{ background: rgba(255,255,255,0.96); color:#000; padding: 14px; border-radius: 16px; margin-top: 14px; text-align:left; font-size: .92rem; box-shadow: 0 10px 24px rgba(0,0,0,0.16); }
    .user-form { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
    .user-form input { padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.2); font-family: inherit; }

    #pay-btn{ display:block; width:100%; margin-top: 10px; font-weight: 900; padding: 12px; border-radius: 999px; text-align:center; color:#fff; background: rgba(0, 51, 102, 0.92); border:none; cursor:pointer; font-family: inherit; }
    #pay-btn.disabled{ opacity:.55; pointer-events:none; }

    .error-message { padding: 20px; text-align: center; color: #b32a2a; font-weight: bold; }
    .wa-fallback { display: inline-block; margin-top: 10px; background: #25D366; color: white; padding: 10px 20px; border-radius: 999px; text-decoration: none; }
  </style>
</head>

<body>
  <div class="container">
    <h2>Reservá tu Bungalow</h2>
    <p class="subtitle">Elegí el bungalow y seleccioná ingreso y salida</p>

    <div class="top-row">
      <span class="select-wrap">
        <select id="bungalow">
          <option value="Moreno">Moreno</option>
          <option value="Mascardi">Mascardi</option>
          <option value="Traful">Traful</option>
          <option value="Nahuel Huapi">Nahuel Huapi</option>
          <option value="Gutierrez">Gutierrez</option>
          <option value="Espejo">Espejo</option>
        </select>
      </span>
    </div>

    <div id="price-line" class="price-line"></div>

    <div class="calendar-nav">
      <button type="button" onclick="changeMonth(-1)">Mes anterior</button>
      <button type="button" onclick="changeMonth(1)">Mes siguiente</button>
    </div>

    <div id="calendar">
      <div id="loading-overlay" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <span>Consultando disponibilidad...</span>
      </div>
      <div class="month-wrap"><h3 id="month-year"></h3></div>
      <table>
        <thead><tr><th>Dom</th><th>Lun</th><th>Mar</th><th>Mié</th><th>Jue</th><th>Vie</th><th>Sáb</th></tr></thead>
        <tbody id="calendar-body"></tbody>
      </table>
    </div>

    <div class="payment-info" id="payment-section" style="display:none;">
      <h4>Resumen de Reserva</h4>
      <p id="nights-info"></p>
      <p id="amount-info"></p>
      <div id="user-data-form" class="user-form" style="display: none;">
        <input type="text" id="cli-nombre" placeholder="Nombre" required>
        <input type="text" id="cli-apellido" placeholder="Apellido" required>
        <input type="tel" id="cli-contacto" placeholder="WhatsApp / Teléfono" required>
      </div>
      <button id="pay-btn" type="button">Completar datos para reservar</button>
    </div>
  </div>

<script>
  const SHEET_ID = "1gGMZY1YZGADybxtLM5r2zWFqSEoagWkUrFaZDE5oxC4"; 
  const WHATSAPP_NUMBER = "5493548572811"; 
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwKAwyatQPbEyoDIUvaGKrre23etgCzf-6wRGyN8Z9KmUBGERUP2EXZCPXyGKCAT4n3oQ/exec";

  const MP_LINKS = {
    "Moreno": {1:"https://mpago.la/1pVj9LG", 2:"https://mpago.la/1j9Sib4", 3:"https://mpago.la/21VbZ9D", 4:"https://mpago.la/2TUQHV3", 5:"https://mpago.la/2jrrAZ9", 6:"https://mpago.la/2ej75Dr", 7:"https://mpago.la/2PKLx1R"},
    "Mascardi": {1:"https://mpago.la/2fpHFQX", 2:"https://mpago.la/1ZmWrMA", 3:"https://mpago.la/21cKdjC", 4:"https://mpago.la/2WUSDQb", 5:"https://mpago.la/1EAtFja", 6:"https://mpago.la/2CzWMLR", 7:"https://mpago.la/23va53p"},
    "Traful": {1:"https://mpago.la/1LZimqA", 2:"https://mpago.la/2Jjkjxk", 3:"https://mpago.la/13ebBrE", 4:"https://mpago.la/12x4xKp", 5:"https://mpago.la/1As1kNd", 6:"https://mpago.la/1XwPPqr", 7:"https://mpago.la/2SahxXs"},
    "Nahuel Huapi": {1:"https://mpago.la/1X5HrEm", 2:"https://mpago.la/1E4HkEK", 3:"https://mpago.la/2ZK2F2q", 4:"https://mpago.la/2depMzS", 5:"https://mpago.la/2AvRk9D", 6:"https://mpago.la/2WLGbK3", 7:"https://mpago.la/1Jg8peR"},
    "Gutierrez": {1:"https://mpago.la/1kawSyN", 2:"https://mpago.la/28xmpQi", 3:"https://mpago.la/2cbSeB3", 4:"https://mpago.la/1VUa6NB", 5:"https://mpago.la/2xir5PJ", 6:"https://mpago.la/2ohzY7i", 7:"https://mpago.la/1Da6gzD"},
    "Espejo": {1:"https://mpago.la/2TJcdWk", 2:"https://mpago.la/2NYfA3g", 3:"https://mpago.la/2LKCm5j", 4:"https://mpago.la/1E8h1m2", 5:"https://mpago.la/2zGtNnK", 6:"https://mpago.la/27e7nHc", 7:"https://mpago.la/2uKnd1U"}
  };

  const PRICES_PER_NIGHT = {"Moreno":78500, "Mascardi":78500, "Traful":89250, "Nahuel Huapi":99750, "Gutierrez":99750, "Espejo":110250};
  const BG = {"Moreno":"https://imgur.com/e6g5Qwx.jpg", "Mascardi":"https://imgur.com/BOYVJKV.jpg", "Traful":"https://imgur.com/2xP51Lp.jpg", "Nahuel Huapi":"https://imgur.com/wFJ28zC.jpg", "Gutierrez":"https://imgur.com/XLWfgjU.jpg", "Espejo":"https://imgur.com/v1VykFC.jpg"};

  let currentDate = new Date();
  const occupiedCache = new Map();
  let selection = { checkin: null, checkout: null, nights: 0 };

  const toISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const fmtISO = iso => iso.split("-").reverse().join("/");
  const isoToDate = iso => { const [y,m,d] = iso.split("-"); return new Date(y, m-1, d); };
  const fmtARS = n => new Intl.NumberFormat("es-AR", {style:"currency", currency:"ARS", maximumFractionDigits:0}).format(n);

  async function loadAvailabilityData(){
    const room = document.getElementById("bungalow").value;
    const loading = document.getElementById("loading-overlay");
    const body = document.getElementById("calendar-body");
    loading.style.display = "flex";
    body.innerHTML = "";

    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(room)}`;
      const res = await fetch(url, {cache: "no-store"});
      const text = await res.text();
      const occupied = new Set();
      text.split("\n").forEach(row => {
        const parts = row.split(",");
        const dateStr = parts[0].replace(/"/g,"").trim();
        if(parts[1] && parts[1].replace(/"/g,"").trim() !== "") {
          const match = dateStr.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
          if(match) occupied.add(`${match[3].length==2?"20"+match[3]:match[3]}-${match[2].padStart(2,"0")}-${match[1].padStart(2,"0")}`);
        }
      });

      const year = currentDate.getFullYear(), month = currentDate.getMonth();
      document.getElementById("month-year").textContent = currentDate.toLocaleString("es-ES", {month:"long", year:"numeric"});
      const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month+1, 0).getDate();
      const today = new Date(); today.setHours(0,0,0,0);

      let tr = document.createElement("tr");
      for(let i=0; i<firstDay; i++) tr.appendChild(document.createElement("td"));
      for(let d=1; d<=daysInMonth; d++){
        const date = new Date(year, month, d), iso = toISO(date), td = document.createElement("td");
        td.innerHTML = `<div class="day">${d}</div>`;
        td.dataset.fecha = iso;
        if(date < today || occupied.has(iso)) td.className = "unavailable";
        else { td.className = "available"; td.onclick = () => onDayClick(iso, occupied); }
        tr.appendChild(td);
        if(date.getDay() === 6) { body.appendChild(tr); tr = document.createElement("tr"); }
      }
      if(tr.children.length > 0) body.appendChild(tr);
      loading.style.display = "none";
    } catch (e) {
      loading.style.display = "none";
      body.innerHTML = `<tr><td colspan="7" class="error-message">Error al sincronizar.<br><a href="https://wa.me/${WHATSAPP_NUMBER}" class="wa-fallback">Consultar WhatsApp</a></td></tr>`;
    }
    resetSelection();
    updatePriceLine();
  }

  function onDayClick(iso, occupied){
    if(!selection.checkin || (selection.checkin && selection.checkout)) {
      selection = {checkin: iso, checkout: null, nights: 0};
    } else if(iso <= selection.checkin) {
      selection.checkin = iso;
    } else {
      const start = isoToDate(selection.checkin), end = isoToDate(iso), nights = [];
      let temp = new Date(start);
      while(temp < end) { if(occupied.has(toISO(temp))) { alert("Rango ocupado"); return; } nights.push(toISO(temp)); temp.setDate(temp.getDate()+1); }
      selection.checkout = iso; selection.nights = nights.length;
    }
    renderSelection();
    updateSummary();
  }

  function renderSelection(){
    document.querySelectorAll("td").forEach(td => td.classList.remove("selected-day", "checkin", "checkout"));
    if(selection.checkin) document.querySelector(`td[data-fecha="${selection.checkin}"]`)?.classList.add("checkin");
    if(selection.checkout) {
      document.querySelector(`td[data-fecha="${selection.checkout}"]`)?.classList.add("checkout");
      let temp = isoToDate(selection.checkin); temp.setDate(temp.getDate()+1);
      while(toISO(temp) < selection.checkout) { document.querySelector(`td[data-fecha="${toISO(temp)}"]`)?.classList.add("selected-day"); temp.setDate(temp.getDate()+1); }
    }
  }

  function updateSummary(){
    const section = document.getElementById("payment-section"), room = document.getElementById("bungalow").value, price = PRICES_PER_NIGHT[room];
    section.style.display = selection.checkin ? "block" : "none";
    document.getElementById("nights-info").textContent = `Bungalow: ${room} · Ingreso: ${fmtISO(selection.checkin)}` + (selection.checkout ? ` · Salida: ${fmtISO(selection.checkout)}` : "");
    document.getElementById("amount-info").textContent = selection.checkout ? `Total (${selection.nights} noches): ${fmtARS(selection.nights * price)}` : `Precio por noche: ${fmtARS(price)}`;
    
    const btn = document.getElementById("pay-btn"), form = document.getElementById("user-data-form");
    if(selection.checkout) {
      if(selection.nights <= 7) { 
        form.style.display = "flex"; btn.textContent = "Bloquear fechas y Pagar"; 
        btn.onclick = () => bookAndPay(MP_LINKS[room][selection.nights]);
      } else {
        form.style.display = "none"; btn.textContent = "Consultar WhatsApp (+7 noches)";
        btn.onclick = () => window.location.href = `https://wa.me/${WHATSAPP_NUMBER}?text=Reserva ${room} del ${fmtISO(selection.checkin)} al ${fmtISO(selection.checkout)}`;
      }
    } else { form.style.display = "none"; btn.textContent = "Elegí la salida"; }
  }

async function bookAndPay(link) {
    const n = document.getElementById("cli-nombre").value;
    const a = document.getElementById("cli-apellido").value;
    const c = document.getElementById("cli-contacto").value;
    
    if(!n || !a || !c) return alert("Completá tus datos");
    
    const btn = document.getElementById("pay-btn");
    btn.textContent = "Registrando...";
    btn.classList.add("disabled");

    // Construimos la URL de llamada
    const params = new URLSearchParams({
      bungalow: document.getElementById("bungalow").value,
      checkin: selection.checkin,
      checkout: selection.checkout,
      nombre: n,
      apellido: a,
      contacto: c
    });

    const finalUrl = APPS_SCRIPT_URL + "?" + params.toString();

    // EJECUCIÓN DOBLE: Llamamos al script y redirigimos
    // Usamos un pequeño delay para dar tiempo a que Google reciba el dato
    fetch(finalUrl, { mode: "no-cors" });
    
    setTimeout(() => {
      window.location.href = link;
    }, 800);
  }

  function resetSelection(){ selection = {checkin:null, checkout:null, nights:0}; updateSummary(); renderSelection(); }
  function updatePriceLine(){ const r = document.getElementById("bungalow").value; document.getElementById("price-line").textContent = `${r} · ${fmtARS(PRICES_PER_NIGHT[r])} por noche`; }
  function changeMonth(off){ currentDate.setMonth(currentDate.getMonth()+off); loadAvailabilityData(); }

  document.getElementById("bungalow").onchange = () => {
    const r = document.getElementById("bungalow").value;
    document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)), url(${BG[r]})`;
    loadAvailabilityData();
  };

  document.addEventListener("DOMContentLoaded", () => { document.getElementById("bungalow").dispatchEvent(new Event('change')); });
</script>
</body>
</html>
